name: Release

on:
  workflow_dispatch: # allows manual triggering
    inputs:
      create_release:
        description: 'Create new release'
        required: true
        type: boolean
  push:
    branches:
      - master
    paths: [
      '.github/workflows/release.yml',
      '**/CMakeLists.txt',
      '**/.cmake',
      '**/*.h',
      '**/*.hpp',
      '**/*.c',
      '**/*.cpp',
      '**/*.cu',
      '**/*.cuh',
      '**/*.swift',
      '**/*.m',
      '**/*.metal',
      '**/*.comp',
      '**/*.glsl'
    ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
  CMAKE_ARGS: "-DLLAMA_BUILD_EXAMPLES=OFF -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_TOOLS=ON -DLLAMA_BUILD_SERVER=ON -DGGML_RPC=ON"

jobs:
  windows-cpu:
    runs-on: windows-2025

    strategy:
      matrix:
        include:
          - arch: 'x64'

    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: windows-latest-cpu-${{ matrix.arch }}
          variant: ccache
          evict-old-files: 1d

      - name: Install Ninja
        run: |
          choco install ninja

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" ${{ matrix.arch == 'x64' && 'x64' || 'amd64_arm64' }}
          cmake -S . -B build -G "Ninja Multi-Config" ^
            -D CMAKE_TOOLCHAIN_FILE=cmake/${{ matrix.arch }}-windows-llvm.cmake ^
            -DLLAMA_BUILD_BORINGSSL=ON ^
            -DGGML_NATIVE=OFF ^
            -DGGML_BACKEND_DL=ON ^
            -DGGML_CPU_ALL_VARIANTS=${{ matrix.arch == 'x64' && 'ON' || 'OFF' }} ^
            -DGGML_OPENMP=ON ^
            ${{ env.CMAKE_ARGS }}
          cmake --build build --config Release

      - name: Pack artifacts
        id: pack_artifacts
        run: |
          Copy-Item "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Redist\MSVC\14.44.35112\debug_nonredist\${{ matrix.arch }}\Microsoft.VC143.OpenMP.LLVM\libomp140.${{ matrix.arch == 'x64' && 'x86_64' || 'aarch64' }}.dll" .\build\bin\Release\
          7z a -snl llama-bin-win-cpu-${{ matrix.arch }}.zip .\build\bin\Release\*

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          path: llama-bin-win-cpu-${{ matrix.arch }}.zip
          name: llama-bin-win-cpu-${{ matrix.arch }}.zip

windows-hip:
  runs-on: windows-2022

  env:
    HIPSDK_INSTALLER_VERSION: "26.Q1"

  strategy:
    matrix:
      include:
        - name: "radeon"
          gpu_targets: "gfx1201"
          exclude_flag: "BUILD_SHARED_LIBS"

        - name: "radeon"
          gpu_targets: "gfx1201"
          exclude_flag: "LLAMA_CURL"

        - name: "radeon"
          gpu_targets: "gfx1201"
          exclude_flag: "GGML_CUDA_FORCE_CUBLAS"

        - name: "radeon"
          gpu_targets: "gfx1201"
          exclude_flag: "GGML_HIP_GRAPHS"

        - name: "radeon"
          gpu_targets: "gfx1201"
          exclude_flag: "GGML_CUDA_FORCE_MMQ"

        - name: "radeon"
          gpu_targets: "gfx1201"
          exclude_flag: "HIP_PLATFORM"

  steps:
    - name: Clone
      uses: actions/checkout@v6

    - name: Grab rocWMMA package
      run: |
        curl -o rocwmma.deb "https://repo.radeon.com/rocm/apt/7.2/pool/main/r/rocwmma-dev/rocwmma-dev_2.2.0.70200-43~24.04_amd64.deb"
        7z x rocwmma.deb
        7z x data.tar

    - name: Cache ROCm Installation
      id: cache-rocm
      uses: actions/cache@v5
      with:
        path: C:\Program Files\AMD\ROCm
        key: rocm-${{ env.HIPSDK_INSTALLER_VERSION }}-${{ runner.os }}

    - name: ccache
      uses: ggml-org/ccache-action@v1.2.21
      with:
        key: windows-hip-${{ env.HIPSDK_INSTALLER_VERSION }}-${{ matrix.variant }}-${{ matrix.name }}
        evict-old-files: 1d

    - name: Install ROCm
      if: steps.cache-rocm.outputs.cache-hit != 'true'
      run: |
        $ErrorActionPreference = "Stop"
        Invoke-WebRequest -Uri "https://download.amd.com/developer/eula/rocm-hub/AMD-Software-PRO-Edition-${{ env.HIPSDK_INSTALLER_VERSION }}-Win11-For-HIP.exe" -OutFile "${env:RUNNER_TEMP}\rocm-install.exe"
        $proc = Start-Process "${env:RUNNER_TEMP}\rocm-install.exe" -ArgumentList '-install' -NoNewWindow -PassThru
        $proc.WaitForExit(600000)
        if ($proc.ExitCode -ne 0) { exit 1 }

    - name: Verify ROCm
      run: |
        $clangPath = Get-ChildItem 'C:\Program Files\AMD\ROCm\*\bin\clang.exe' | Select-Object -First 1
        if (-not $clangPath) { exit 1 }
        & $clangPath.FullName --version

    - name: Build
      run: |
        $env:HIP_PATH=$(Resolve-Path 'C:\Program Files\AMD\ROCm\*\bin\clang.exe' | split-path | split-path)
        $env:CMAKE_PREFIX_PATH="${env:HIP_PATH}"

        # Base flags (always included)
        $BASE_FLAGS = @(
          "-DGGML_BACKEND_DL=ON",
          "-DGGML_NATIVE=OFF",
          "-DGGML_CPU=OFF",
          "-DGPU_TARGETS=${{ matrix.gpu_targets }}",
          "-DGGML_HIP_ROCWMMA_FATTN=ON",
          "-DGGML_HIP=ON",
          "-DLLAMA_BUILD_TESTS=OFF",
          "-DLLAMA_BUILD_BORINGSSL=ON"
        )

        # Optional flags (we will remove ONE of these)
        $OPTIONAL_FLAGS = @{
          "BUILD_SHARED_LIBS"        = "-DBUILD_SHARED_LIBS=ON"
          "LLAMA_CURL"               = "-DLLAMA_CURL=OFF"
          "GGML_CUDA_FORCE_CUBLAS"   = "-DGGML_CUDA_FORCE_CUBLAS=OFF"
          "GGML_HIP_GRAPHS"          = "-DGGML_HIP_GRAPHS=ON"
          "GGML_CUDA_FORCE_MMQ"      = "-DGGML_CUDA_FORCE_MMQ=ON"
          "HIP_PLATFORM"             = "-DHIP_PLATFORM=amd"
        }

        $EXCLUDE = "${{ matrix.exclude_flag }}"

        # Build final flag list
        $FINAL_FLAGS = @()
        foreach ($key in $OPTIONAL_FLAGS.Keys) {
          if ($key -ne $EXCLUDE) {
            $FINAL_FLAGS += $OPTIONAL_FLAGS[$key]
          } else {
            Write-Host "Excluding flag: $key"
          }
        }

        $ALL_FLAGS = $BASE_FLAGS + $FINAL_FLAGS

        cmake -G "Unix Makefiles" -B build-${{ matrix.exclude_flag }} -S . `
          -DCMAKE_C_COMPILER="${env:HIP_PATH}\bin\clang.exe" `
          -DCMAKE_CXX_COMPILER="${env:HIP_PATH}\bin\clang++.exe" `
          -DCMAKE_CXX_FLAGS="-I$($PWD.Path.Replace('\', '/'))/opt/rocm-7.2.0/include/ -Wno-ignored-attributes -Wno-nested-anon-types" `
          -DCMAKE_BUILD_TYPE=Release `
          $ALL_FLAGS

        cmake --build build-${{ matrix.exclude_flag }} --target ggml-hip -j ${env:NUMBER_OF_PROCESSORS}

        md "build-${{ matrix.exclude_flag }}\bin\rocblas\library\"
        md "build-${{ matrix.exclude_flag }}\bin\hipblaslt\library"

        cp "${env:HIP_PATH}\bin\libhipblas.dll" "build-${{ matrix.exclude_flag }}\bin\"
        cp "${env:HIP_PATH}\bin\libhipblaslt.dll" "build-${{ matrix.exclude_flag }}\bin\"
        cp "${env:HIP_PATH}\bin\rocblas.dll" "build-${{ matrix.exclude_flag }}\bin\"

        cp "${env:HIP_PATH}\bin\rocblas\library\*" "build-${{ matrix.exclude_flag }}\bin\rocblas\library\"
        cp "${env:HIP_PATH}\bin\hipblaslt\library\*" "build-${{ matrix.exclude_flag }}\bin\hipblaslt\library\"
    - name: Pack artifacts
      run: |
        7z a -snl llama-bin-win-hip-${{ matrix.name }}-no-${{ matrix.exclude_flag }}-x64.zip .\build-${{ matrix.exclude_flag }}\bin\*

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        path: llama-bin-win-hip-${{ matrix.name }}-no-${{ matrix.exclude_flag }}-x64.zip
        name: llama-bin-win-hip-${{ matrix.name }}-no-${{ matrix.exclude_flag }}-x64.zip

  release:
    if: ${{ ( github.event_name == 'push' && github.ref == 'refs/heads/master' ) || github.event.inputs.create_release == 'true' }}

    # Fine-grant permission
    # https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication#modifying-the-permissions-for-the-github_token
    permissions:
        contents: write # for creating release

    runs-on: ubuntu-slim

    needs:
      - windows-hip

    steps:
      - name: Clone
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Download artifacts
        id: download-artifact
        uses: actions/download-artifact@v7
        with:
          path: ./artifact
          merge-multiple: true

      - name: Merge CPU into HIP variants
        run: |
          mkdir -p release

          cpu_zip="artifact/llama-bin-win-cpu-x64.zip"

          echo "Extracting CPU once..."
          cpu_tmp=$(mktemp -d)
          unzip "$cpu_zip" -d "$cpu_tmp"

          for hip_zip in artifact/llama-bin-win-hip-*-x64.zip; do
            echo "Processing $(basename "$hip_zip")"

            tmp_dir=$(mktemp -d)
            unzip "$hip_zip" -d "$tmp_dir"

            echo "Merging CPU files..."
            cp -r "$cpu_tmp"/* "$tmp_dir"/

            final_name=$(basename "$hip_zip")
            zip -r "release/$final_name" -j "$tmp_dir"/*

            rm -rf "$tmp_dir"
          done

          rm -rf "$cpu_tmp"
          
      - name: Create release
        id: create_release
        uses: ggml-org/action-create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          body: |
            <details open>

            ${{ github.event.head_commit.message }}

            </details>

            ### Downloads

            - [Windows x64 (CPU)](https://github.com/Kunii/llama.cpp-rocm-gfx120x/releases/download/${{ steps.tag.outputs.name }}/llama-${{ steps.tag.outputs.name }}-bin-win-cpu-x64.zip)

            #### HIP Variants (each missing one flag)

            - [no BUILD_SHARED_LIBS](https://github.com/Kunii/llama.cpp-rocm-gfx120x/releases/download/${{ steps.tag.outputs.name }}/llama-${{ steps.tag.outputs.name }}-bin-win-hip-radeon-no-BUILD_SHARED_LIBS-x64.zip)
            - [no LLAMA_CURL](https://github.com/Kunii/llama.cpp-rocm-gfx120x/releases/download/${{ steps.tag.outputs.name }}/llama-${{ steps.tag.outputs.name }}-bin-win-hip-radeon-no-LLAMA_CURL-x64.zip)
            - [no GGML_CUDA_FORCE_CUBLAS](https://github.com/Kunii/llama.cpp-rocm-gfx120x/releases/download/${{ steps.tag.outputs.name }}/llama-${{ steps.tag.outputs.name }}-bin-win-hip-radeon-no-GGML_CUDA_FORCE_CUBLAS-x64.zip)
            - [no GGML_HIP_GRAPHS](https://github.com/Kunii/llama.cpp-rocm-gfx120x/releases/download/${{ steps.tag.outputs.name }}/llama-${{ steps.tag.outputs.name }}-bin-win-hip-radeon-no-GGML_HIP_GRAPHS-x64.zip)
            - [no GGML_CUDA_FORCE_MMQ](https://github.com/Kunii/llama.cpp-rocm-gfx120x/releases/download/${{ steps.tag.outputs.name }}/llama-${{ steps.tag.outputs.name }}-bin-win-hip-radeon-no-GGML_CUDA_FORCE_MMQ-x64.zip)
            - [no HIP_PLATFORM](https://github.com/Kunii/llama.cpp-rocm-gfx120x/releases/download/${{ steps.tag.outputs.name }}/llama-${{ steps.tag.outputs.name }}-bin-win-hip-radeon-no-HIP_PLATFORM-x64.zip)

      - name: Upload release
        id: upload_release
        uses: actions/github-script@v8
        with:
          github-token: ${{secrets.GH_TOKEN}}
          script: |
            const path = require('path');
            const fs = require('fs');
            const release_id = '${{ steps.create_release.outputs.id }}';
            for (let file of await fs.readdirSync('./release')) {
              if (path.extname(file) === '.zip' || file.endsWith('.tar.gz')) {
                console.log('uploadReleaseAsset', file);
                await github.rest.repos.uploadReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release_id,
                  name: file,
                  data: await fs.readFileSync(`./release/${file}`)
                });
              }
            }

