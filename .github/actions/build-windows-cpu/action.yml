name: Build Windows CPU
description: "Build windows x64"
inputs:
  arch:
    description: 'Architecture to build for'
    required: true
  CMAKE_ARGS:
    description: 'CMAKE_ARGS'
    required: true
runs:
  using: "composite"
  steps:
    - name: Clone
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: ccache
      uses: ggml-org/ccache-action@v1.2.21
      with:
        key: windows-latest-cpu-${{ inputs.arch }}
        variant: ccache
        evict-old-files: 1d

    - name: Install Ninja
      shell: pwsh
      run: |
        choco install ninja

    - name: Build
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
        cmake -S . -B build -G "Ninja Multi-Config" ^
          -D CMAKE_TOOLCHAIN_FILE=cmake/${{ inputs.arch }}-windows-llvm.cmake ^
          -DLLAMA_BUILD_BORINGSSL=ON ^
          -DGGML_NATIVE=OFF ^
          -DGGML_BACKEND_DL=ON ^
          -DGGML_CPU_ALL_VARIANTS=${{ inputs.arch == 'x64' && 'ON' || 'OFF' }} ^
          -DGGML_OPENMP=ON ^
          ${{ inputs.CMAKE_ARGS }}
        cmake --build build --config Release

    - name: Pack artifacts
      id: pack_artifacts
      shell: pwsh
      run: |
        Copy-Item "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Redist\MSVC\14.44.35112\debug_nonredist\x64\Microsoft.VC143.OpenMP.LLVM\libomp140.x86_64.dll" .\build\bin\Release\
        7z a -snl llama-bin-win-cpu-x64.zip .\build\bin\Release\*

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        path: llama-bin-win-cpu-x64.zip
        name: llama-bin-win-cpu-x64.zip
