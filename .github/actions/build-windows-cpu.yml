name: Build Windows CPU

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Architecture to build for Windows x64'
        required: true
        type: choice
        options:
          - x64
  push:
    branches:
      - master
    paths:
      - '.github/actions/build-windows-cpu.yml'
      - '**/CMakeLists.txt'
      - '**/.cmake'
      - '**/*.h'
      - '**/*.hpp'
      - '**/*.c'
      - '**/*.cpp'
      - '**/*.cu'
      - '**/*.cuh'
      - '**/*.swift'
      - '**/*.m'
      - '**/*.metal'
      - '**/*.comp'
      - '**/*.glsl'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
  CMAKE_ARGS: "-DLLAMA_BUILD_EXAMPLES=OFF -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_TOOLS=ON -DLLAMA_BUILD_SERVER=ON -DGGML_RPC=ON"

runs:
  using: "composite"

  strategy:
    matrix:
      include:
        - arch: 'x64'

  steps:
    - name: Clone
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: ccache
      uses: ggml-org/ccache-action@v1.2.21
      with:
        key: windows-latest-cpu-${{ matrix.arch }}
        variant: ccache
        evict-old-files: 1d

    - name: Install Ninja
      run: |
        choco install ninja

    - name: Build
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
        cmake -S . -B build -G "Ninja Multi-Config" ^
          -D CMAKE_TOOLCHAIN_FILE=cmake/${{ matrix.arch }}-windows-llvm.cmake ^
          -DLLAMA_BUILD_BORINGSSL=ON ^
          -DGGML_NATIVE=OFF ^
          -DGGML_BACKEND_DL=ON ^
          -DGGML_CPU_ALL_VARIANTS=${{ matrix.arch == 'x64' && 'ON' || 'OFF' }} ^
          -DGGML_OPENMP=ON ^
          ${{ env.CMAKE_ARGS }}
        cmake --build build --config Release

    - name: Pack artifacts
      id: pack_artifacts
      run: |
        Copy-Item "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Redist\MSVC\14.44.35112\debug_nonredist\x64\Microsoft.VC143.OpenMP.LLVM\libomp140.x86_64.dll" .\build\bin\Release\
        7z a -snl llama-bin-win-cpu-x64.zip .\build\bin\Release\*

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        path: llama-bin-win-cpu-x64.zip
        name: llama-bin-win-cpu-x64.zip
